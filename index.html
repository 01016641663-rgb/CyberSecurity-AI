<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ مستشارك السيبراني</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border: 1px solid #334155; text-align: center; }
        h2 { color: #38bdf8; }
        .credit { font-size: 14px; color: #94a3b8; margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 16px; margin-bottom: 15px; outline: none; }
        button { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #response { margin-top: 25px; padding: 20px; background: #334155; border-radius: 12px; line-height: 1.8; display: none; text-align: right; border-right: 5px solid #38bdf8; white-space: pre-wrap; }
        .loader { display: none; margin: 20px 0; color: #38bdf8; }
    </style>
</head>
<body>
<div class="container">
    <h2>🛡️ مستشارك السيبراني</h2>
    <div class="credit">عمل خيري مقدم من أيمن ونيس</div>
    <textarea id="userQuestion" placeholder="اسأل هنا..."></textarea>
    <button onclick="askAI()" id="sendBtn">إرسال الاستفسار</button>
    <div id="loader" class="loader">جاري التحليل... ⏳</div>
    <div id="response"></div>
</div>

<script>
    async function askAI() {
        const q = document.getElementById("userQuestion").value;
        const resDiv = document.getElementById("response");
        const btn = document.getElementById("sendBtn");
        const loader = document.getElementById("loader");

        if (!q) return alert("اكتب سؤالك أولاً");

        btn.disabled = true;
        loader.style.display = "block";
        resDiv.style.display = "none";

        const API_KEY = "AIzaSyDraOJHuCeklucWSu-rhfY52EA-No_nMcA"; 
        // الرابط v1beta غالباً ما يكون أكثر مرونة مع متصفحات الويب
        const url = "https://googleapis.com" + API_KEY;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ "contents":}] })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                resDiv.innerText = data.candidates[0].content.parts[0].text;
                resDiv.style.display = "block";
            } else if (data.error) {
                resDiv.innerText = "خطأ من جوجل: " + data.error.message;
                resDiv.style.display = "block";
            } else {
                resDiv.innerText = "لم تصل إجابة، تأكد من تفعيل المفتاح في AI Studio.";
                resDiv.style.display = "block";
            }
        } catch (error) {
            resDiv.innerText = "حدث خطأ: " + error.message;
            resDiv.style.display = "block";
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
